<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>סידור חכם לכיתה</title>
  <script>
    // GitHub Pages SPA redirect — שומר את הנתיב ב-sessionStorage ומפנה לשורש
    var path = window.location.pathname;
    var base = '/Seat-manager';
    if (path.startsWith(base)) {
      sessionStorage.setItem('spa_redirect', path + window.location.search + window.location.hash);
    }
  </script>
  <meta http-equiv="refresh" content="0;URL='/Seat-manager/'">
</head>
<body></body>
</html>
